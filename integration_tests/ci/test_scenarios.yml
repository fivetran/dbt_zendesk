schema_variable_name: "zendesk_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: true

  - name: "features disabled"
    vars:
      using_sla_policy_metric_history: false
      using_ticket_sla_policy: false
      using_audit_log: true
      zendesk__unstructured_enabled: true
      using_schedules: false
      using_domain_names: false
      using_user_tags: false
      using_ticket_form_history: false
      using_organization_tags: false
      using_organizations: false
      using_ticket_chat: true
    include_incremental: false

  - name: "custom user criteria"
    vars:
      using_audit_log: true
      internal_user_criteria: "role like '%agent%'"
      using_schedule_histories: false
      using_holidays: false
      using_ticket_chat: true
    include_incremental: false

  - name: "holidays enabled"
    vars:
      using_holidays: true
      using_ticket_chat: true
    include_incremental: false
